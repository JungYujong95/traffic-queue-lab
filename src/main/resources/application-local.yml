spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/traffic_queue_lab?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:traffic_user}
    password: ${SPRING_DATASOURCE_PASSWORD:traffic_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:10}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:3000}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:3s}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}

app:
  jwt:
    secret: ${APP_JWT_SECRET:traffic-queue-lab-local-jwt-secret-key-traffic-queue-lab}
    issuer: ${APP_JWT_ISSUER:traffic-queue-lab}
    access-token-ttl: ${APP_JWT_ACCESS_TOKEN_TTL:PT1H}

  wait-queue:
    worker:
      enabled: ${APP_WAIT_QUEUE_WORKER_ENABLED:true}
      coupon-id: ${APP_WAIT_QUEUE_WORKER_COUPON_ID:1}
      batch-size: ${APP_WAIT_QUEUE_WORKER_BATCH_SIZE:1}
      fixed-delay-ms: ${APP_WAIT_QUEUE_WORKER_FIXED_DELAY_MS:50}
      lock-ttl: ${APP_WAIT_QUEUE_WORKER_LOCK_TTL:30s}
      result-ttl: ${APP_WAIT_QUEUE_RESULT_TTL:30m}
